<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarjin Pisatelj ✍️</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #A8DADC; font-family: 'Comic Sans MS', cursive; margin-top: 30px; }
        #status { color: #aaa; font-size: 0.9rem; margin-bottom: 10px; min-height: 20px; }
        .record-btn {
            width: 280px; height: 90px; border-radius: 25px; border: none;
            background: #457B9D; color: white; font-size: 1.3rem; font-weight: bold;
            cursor: pointer; margin: 15px auto; display: block; transition: 0.3s;
        }
        .record-btn.recording { background: #E63946; }
        textarea {
            width: 90%; max-width: 500px; height: 220px; background: #16213e;
            color: white; border-radius: 15px; padding: 15px; border: 1px solid #457B9D;
            font-size: 1.1rem; line-height: 1.6; margin-top: 10px; resize: vertical;
            box-sizing: border-box;
        }
        textarea:focus { outline: none; border-color: #A8DADC; }
        .btn-row { margin: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; color: white; cursor: pointer; font-weight: bold; font-size: 0.95rem; }
        .btn-green { background: #2D6A4F; }
        .btn-red { background: #E63946; }
        .btn-blue { background: #457B9D; }
        .hint { font-size: 0.75rem; color: #555; margin-top: 8px; line-height: 1.9; }
    </style>
</head>
<body>
    <h1>Zarjin Pisatelj ✍️</h1>
    <p id="status">Pripravljena na tvoje zgodbe!</p>

    <button class="record-btn" id="recordBtn" onclick="toggleRecording()">🎤 ZAČNI PISANJE</button>

    <textarea id="textOutput" placeholder="Tukaj se bo izpisalo tvoje besedilo..."></textarea>

    <div class="hint">
        🗣️ Reci: <b>"pika"</b> → .&nbsp; <b>"vejica"</b> → ,&nbsp; <b>"vprašaj"</b> → ?&nbsp; <b>"klicaj"</b> → !&nbsp; <b>"nov odstavek"</b> → ↵
    </div>

    <div class="btn-row">
        <button class="btn btn-green" onclick="speak()">🔊 Preberi</button>
        <button class="btn btn-blue" onclick="copyText()">📋 Kopiraj</button>
        <button class="btn btn-red" onclick="clearText()">🗑️ Pobriši</button>
    </div>

    <script>
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        let recognition = null;
        let isRecording = false;
        let confirmedText = '';

        function applyPunctuation(text) {
            text = text.replace(/\s*\bpika\b\s*/gi,        '. ');
            text = text.replace(/\s*\bvejica\b\s*/gi,      ', ');
            text = text.replace(/\s*\bvprašaj\b\s*/gi,     '? ');
            text = text.replace(/\s*\bklicaj\b\s*/gi,      '! ');
            text = text.replace(/\s*\b(nov odstavek|nova vrstica)\b\s*/gi, '\n');
            text = text.replace(/\s*\bdvopičje\b\s*/gi,    ': ');
            text = text.replace(/\s*\bpomišljaj\b\s*/gi,   ' - ');
            text = text.replace(/[ \t]{2,}/g, ' ');
            text = text.replace(/([.?!]\s+)([a-zčšžćđ])/g, (_, p, c) => p + c.toUpperCase());
            return text.trim();
        }

        function capitalizeFirst(t) {
            return t ? t.charAt(0).toUpperCase() + t.slice(1) : t;
        }

        function endsWithBreak(t) {
            const s = t.trimEnd();
            return !s || s.endsWith('.') || s.endsWith('?') || s.endsWith('!') || s.endsWith('\n');
        }

        function appendToConfirmed(transcript) {
            let processed = applyPunctuation(transcript);
            if (endsWithBreak(confirmedText)) processed = capitalizeFirst(processed);
            const needsSpace = confirmedText.length > 0
                && !confirmedText.endsWith('\n') && !confirmedText.endsWith(' ');
            confirmedText += (needsSpace ? ' ' : '') + processed;
        }

        function toggleRecording() {
            if (!isRecording) startRecording();
            else stopRecording();
        }

        function startRecording() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) { alert("Tvoj brskalnik ne podpira govora. Prosim uporabi Chrome."); return; }

            confirmedText = document.getElementById('textOutput').value;

            recognition = new Speech();
            recognition.lang = 'sl-SI';
            recognition.maxAlternatives = 1;
            // Na telefonu: continuous=true, interimResults=false → brez klikanja, brez restartov
            // Na računalniku: continuous=true, interimResults=true → sproten prikaz
            recognition.continuous = true;
            recognition.interimResults = !isMobile;

            recognition.onresult = (event) => {
                let interimText = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        appendToConfirmed(event.results[i][0].transcript);
                        interimText = '';
                    } else {
                        interimText = event.results[i][0].transcript;
                    }
                }
                const sp = interimText && confirmedText.length > 0
                    && !confirmedText.endsWith('\n') && !confirmedText.endsWith(' ');
                document.getElementById('textOutput').value =
                    confirmedText + (interimText ? (sp ? ' ' : '') + interimText : '');
            };

            recognition.onerror = (e) => {
                // Ignoriraj no-speech in aborted — ne ustavi snemanja
                if (e.error === 'no-speech' || e.error === 'aborted') return;
                console.error('Napaka:', e.error);
            };

            recognition.onend = () => {
                // continuous=true ne bi smel sprožiti onend med snemanjem
                // Če se vseeno zgodi (Android bug), tiho ignoriramo
            };

            try { recognition.start(); } catch(e) { console.error(e); return; }

            isRecording = true;
            document.getElementById('recordBtn').textContent = '⏹️ USTAVI';
            document.getElementById('recordBtn').classList.add('recording');
            document.getElementById('status').textContent = '👂 Poslušam te...';
        }

        function stopRecording() {
            isRecording = false;
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
                recognition = null;
            }
            let text = document.getElementById('textOutput').value.trim();
            if (text && !text.endsWith('.') && !text.endsWith('?') && !text.endsWith('!')) text += '.';
            document.getElementById('textOutput').value = text;
            confirmedText = text;
            document.getElementById('recordBtn').textContent = '🎤 ZAČNI PISANJE';
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('status').textContent = '✅ Končano.';
        }

        document.getElementById('textOutput').addEventListener('input', () => {
            confirmedText = document.getElementById('textOutput').value;
        });

        function speak() {
            const text = document.getElementById('textOutput').value;
            if (!text) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'sl-SI';
            utter.rate = 0.92;
            const voices = window.speechSynthesis.getVoices();
            const sloVoice = voices.find(v => v.lang === 'sl-SI' || v.lang.startsWith('sl'));
            if (sloVoice) utter.voice = sloVoice;
            window.speechSynthesis.speak(utter);
            document.getElementById('status').textContent = '🔊 Berem...';
            utter.onend = () => document.getElementById('status').textContent = '✅ Končano.';
        }

        function copyText() {
            const text = document.getElementById('textOutput').value;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('status').textContent = '📋 Kopirano!';
                setTimeout(() => document.getElementById('status').textContent = '✅ Končano.', 2000);
            });
        }

        function clearText() {
            if (confirm("Ali res želiš pobrisati vse?")) {
                document.getElementById('textOutput').value = '';
                confirmedText = '';
                document.getElementById('status').textContent = '🗑️ Pobrisano.';
            }
        }

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>
</html>
