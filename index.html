<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarjin Pisatelj ✍️</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #A8DADC; font-family: 'Comic Sans MS', cursive; margin-top: 30px; }
        #status { color: #aaa; font-size: 0.9rem; margin-bottom: 20px; min-height: 20px; }
        .record-btn {
            width: 280px; height: 90px; border-radius: 25px; border: none;
            background: #457B9D; color: white; font-size: 1.3rem; font-weight: bold;
            cursor: pointer; margin: 20px auto; display: block; transition: 0.3s;
        }
        .record-btn.recording { background: #E63946; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.05);} 100%{transform:scale(1);} }
        textarea {
            width: 90%; max-width: 500px; height: 220px; background: #16213e;
            color: white; border-radius: 15px; padding: 15px; border: 1px solid #457B9D;
            font-size: 1.1rem; line-height: 1.6; margin-top: 10px; resize: vertical;
            box-sizing: border-box;
        }
        textarea:focus { outline: none; border-color: #A8DADC; }
        .btn-row { margin: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; color: white; cursor: pointer; font-weight: bold; font-size: 0.95rem; }
        .btn-green { background: #2D6A4F; }
        .btn-red { background: #E63946; }
        .btn-blue { background: #457B9D; }
        .hint { font-size: 0.75rem; color: #666; margin-top: 10px; line-height: 1.8; }
        #editNotice { font-size: 0.75rem; color: #E63946; margin-top: 5px; display: none; }
    </style>
</head>
<body>
    <h1>Zarjin Pisatelj ✍️</h1>
    <p id="status">Pripravljena na tvoje zgodbe!</p>

    <button class="record-btn" id="recordBtn" onclick="toggleRecording()">🎤 ZAČNI PISANJE</button>

    <textarea id="textOutput" placeholder="Tukaj se bo izpisalo tvoje besedilo..."></textarea>
    <p id="editNotice">✏️ Urejanje — govor se dodaja na konec</p>

    <div class="hint">
        🗣️ Reci: <b>"pika"</b> → .&nbsp;&nbsp; <b>"vejica"</b> → ,&nbsp;&nbsp; <b>"vprašaj"</b> → ?&nbsp;&nbsp; <b>"klicaj"</b> → !&nbsp;&nbsp; <b>"nov odstavek"</b> → ↵
    </div>

    <div class="btn-row">
        <button class="btn btn-green" onclick="speak()">🔊 Preberi</button>
        <button class="btn btn-blue" onclick="copyText()">📋 Kopiraj</button>
        <button class="btn btn-red" onclick="clearText()">🗑️ Pobriši</button>
    </div>

    <script>
        let recognition = null;
        let isRecording = false;
        let confirmedText = '';
        let userIsEditing = false;
        let restartTimer = null;
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        function applyPunctuation(text) {
            // Zamenjaj besede za ločila
            text = text.replace(/\s*\bpika\b\s*/gi, '. ');
            text = text.replace(/\s*\bvejica\b\s*/gi, ', ');
            text = text.replace(/\s*\bvprašaj\b\s*/gi, '? ');
            text = text.replace(/\s*\bklicaj\b\s*/gi, '! ');
            text = text.replace(/\s*\b(nov odstavek|nova vrstica)\b\s*/gi, '\n');
            text = text.replace(/\s*\bdvopičje\b\s*/gi, ': ');
            text = text.replace(/\s*\bpomišljaj\b\s*/gi, ' - ');
            // Počisti dvojne presledke (ne dotikaj se \n)
            text = text.replace(/[ \t]{2,}/g, ' ');
            // Velika začetnica po ločilu
            text = text.replace(/([.?!]\s+)([a-zčšžćđ])/g, (m, p, c) => p + c.toUpperCase());
            return text.trim();
        }

        function capitalizeFirst(text) {
            if (!text) return text;
            return text.charAt(0).toUpperCase() + text.slice(1);
        }

        function endsWithPunctuation(text) {
            const t = text.trimEnd();
            return t.endsWith('.') || t.endsWith('?') || t.endsWith('!') || t.endsWith('\n');
        }

        // Ko uporabnik klikne v textarea med snemanjem
        document.getElementById('textOutput').addEventListener('focus', () => {
            if (isRecording) {
                // Shrani trenutno stanje polja (z morebitnimi popravki)
                confirmedText = document.getElementById('textOutput').value;
                userIsEditing = true;
                document.getElementById('editNotice').style.display = 'block';
            }
        });

        document.getElementById('textOutput').addEventListener('blur', () => {
            if (isRecording) {
                // Ko zapusti polje, posodobi confirmedText
                confirmedText = document.getElementById('textOutput').value;
                userIsEditing = false;
                document.getElementById('editNotice').style.display = 'none';
            }
        });

        // Tudi ob vsakem tipkanju posodobi confirmedText
        document.getElementById('textOutput').addEventListener('input', () => {
            if (isRecording) {
                confirmedText = document.getElementById('textOutput').value;
            }
        });

        function buildRecognition() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) {
                alert("Tvoj brskalnik ne podpira govora. Prosim uporabi Chrome.");
                return null;
            }

            const rec = new Speech();
            rec.lang = 'sl-SI';
            rec.continuous = false;
            rec.interimResults = !isMobile; // na telefonu brez interim (brez piskanja)
            rec.maxAlternatives = 1;

            rec.onresult = (event) => {
                let interimText = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;

                    if (event.results[i].isFinal) {
                        let processed = applyPunctuation(transcript);

                        const base = confirmedText.trimEnd();
                        if (!base || endsWithPunctuation(base)) {
                            processed = capitalizeFirst(processed);
                        }

                        // Dodaj presledek če je potreben
                        const needsSpace = confirmedText.length > 0
                            && !confirmedText.endsWith('\n')
                            && !confirmedText.endsWith(' ');

                        confirmedText += (needsSpace ? ' ' : '') + processed;
                        interimText = '';
                    } else {
                        interimText = transcript;
                    }
                }

                // Prikaži besedilo — ne prepiši če uporabnik ureja
                if (!userIsEditing) {
                    const needsSpace = interimText && confirmedText.length > 0
                        && !confirmedText.endsWith('\n')
                        && !confirmedText.endsWith(' ');
                    document.getElementById('textOutput').value =
                        confirmedText + (interimText ? (needsSpace ? ' ' : '') + interimText : '');
                }
            };

            rec.onerror = (e) => {
                if (e.error === 'no-speech') return;
                console.error('Napaka:', e.error);
            };

            rec.onend = () => {
                if (isRecording) {
                    restartTimer = setTimeout(() => {
                        if (isRecording && recognition) {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 150);
                }
            };

            return rec;
        }

        function toggleRecording() {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        }

        function startRecording() {
            confirmedText = document.getElementById('textOutput').value;
            userIsEditing = false;

            recognition = buildRecognition();
            if (!recognition) return;

            try { recognition.start(); } catch(e) { console.error(e); return; }

            isRecording = true;
            document.getElementById('recordBtn').textContent = '⏹️ USTAVI';
            document.getElementById('recordBtn').classList.add('recording');
            document.getElementById('status').textContent = isMobile ? '👂 Poslušam (telefon)...' : '👂 Poslušam...';
        }

        function stopRecording() {
            isRecording = false;
            userIsEditing = false;
            document.getElementById('editNotice').style.display = 'none';
            if (restartTimer) clearTimeout(restartTimer);
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
                recognition = null;
            }

            let text = document.getElementById('textOutput').value.trim();
            if (text && !text.endsWith('.') && !text.endsWith('?') && !text.endsWith('!')) {
                text += '.';
            }
            document.getElementById('textOutput').value = text;
            confirmedText = text;

            document.getElementById('recordBtn').textContent = '🎤 ZAČNI PISANJE';
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('status').textContent = '✅ Končano.';
        }

        function speak() {
            const text = document.getElementById('textOutput').value;
            if (!text) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'sl-SI';
            utter.rate = 0.92;
            const voices = window.speechSynthesis.getVoices();
            const sloVoice = voices.find(v => v.lang === 'sl-SI' || v.lang.startsWith('sl'));
            if (sloVoice) utter.voice = sloVoice;
            window.speechSynthesis.speak(utter);
            document.getElementById('status').textContent = '🔊 Berem...';
            utter.onend = () => document.getElementById('status').textContent = '✅ Končano.';
        }

        function copyText() {
            const text = document.getElementById('textOutput').value;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('status').textContent = '📋 Kopirano!';
                setTimeout(() => document.getElementById('status').textContent = '✅ Končano.', 2000);
            });
        }

        function clearText() {
            if (confirm("Ali res želiš pobrisati vse?")) {
                document.getElementById('textOutput').value = '';
                confirmedText = '';
                document.getElementById('status').textContent = '🗑️ Pobrisano.';
            }
        }

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>
</html>
