<script>
    let recognition;
    let isRecording = false;

    function toggleRecording() {
        if (!isRecording) {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new Speech();
            recognition.lang = 'sl-SI';
            recognition.continuous = true;
            recognition.interimResults = true;
            
            recognition.onresult = (event) => {
                let text = '';
                for (let i = 0; i < event.results.length; i++) {
                    let segment = event.results[i][0].transcript;
                    
                    // Mala izboljšava: prva črka velika
                    if (i === 0 || text.endsWith('. ') || text.endsWith('? ')) {
                        segment = segment.trim();
                        segment = segment.charAt(0).toUpperCase() + segment.slice(1);
                    }
                    text += segment + ' ';
                }
                
                // Če se stavek konča in je premor, dodaj piko (simulacija)
                document.getElementById('textOutput').value = text.trim();
            };

            recognition.start();
            isRecording = true;
            document.getElementById('recordBtn').textContent = '⏹️ USTAVI';
            document.getElementById('recordBtn').classList.add('recording');
            document.getElementById('status').textContent = 'Poslušam...';
        } else {
            recognition.stop();
            isRecording = false;
            
            // Ob koncu dodaj piko, če je ni
            let finalVal = document.getElementById('textOutput').value.trim();
            if (finalVal && !finalVal.endsWith('.') && !finalVal.endsWith('?') && !finalVal.endsWith('!')) {
                finalVal += '.';
            }
            document.getElementById('textOutput').value = finalVal;
            
            document.getElementById('recordBtn').textContent = '🎤 ZAČNI PISANJE';
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('status').textContent = 'Končano.';
        }
    }
    // ... ostalo ostane isto
</script>
