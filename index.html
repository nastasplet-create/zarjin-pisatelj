<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarjin Pisatelj ✍️</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #A8DADC; font-family: 'Comic Sans MS', cursive; margin-top: 30px; }
        #status { color: #aaa; font-size: 0.9rem; margin-bottom: 20px; }
        .record-btn {
            width: 280px; height: 90px; border-radius: 25px; border: none;
            background: #457B9D; color: white; font-size: 1.3rem; font-weight: bold;
            cursor: pointer; margin: 20px auto; display: block; transition: 0.3s;
        }
        .record-btn.recording { background: #E63946; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        textarea {
            width: 90%; max-width: 500px; height: 220px; background: #16213e;
            color: white; border-radius: 15px; padding: 15px; border: 1px solid #457B9D;
            font-size: 1.1rem; line-height: 1.6; margin-top: 10px; resize: vertical;
        }
        textarea:focus { outline: none; border-color: #A8DADC; }
        .btn-row { margin: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; color: white; cursor: pointer; font-weight: bold; font-size: 0.95rem; }
        .btn-green { background: #2D6A4F; }
        .btn-red { background: #E63946; }
        .btn-blue { background: #457B9D; }
        .hint { font-size: 0.75rem; color: #555; margin-top: 10px; line-height: 1.8; }
    </style>
</head>
<body>
    <h1>Zarjin Pisatelj ✍️</h1>
    <p id="status">Pripravljena na tvoje zgodbe!</p>

    <button class="record-btn" id="recordBtn" onclick="toggleRecording()">🎤 ZAČNI PISANJE</button>

    <textarea id="textOutput" placeholder="Tukaj se bo izpisalo tvoje besedilo. Med snemanjem lahko sama klikaš in popravljaš!"></textarea>

    <div class="hint">
        🗣️ Reci: <b>"pika"</b> → .&nbsp;&nbsp; <b>"vejica"</b> → ,&nbsp;&nbsp; <b>"vprašaj"</b> → ?&nbsp;&nbsp; <b>"klicaj"</b> → !&nbsp;&nbsp; <b>"nov odstavek"</b> → ↵
    </div>

    <div class="btn-row">
        <button class="btn btn-green" onclick="speak()">🔊 Preberi</button>
        <button class="btn btn-blue" onclick="copyText()">📋 Kopiraj</button>
        <button class="btn btn-red" onclick="clearText()">🗑️ Pobriši</button>
    </div>

    <script>
        let recognition;
        let isRecording = false;
        let savedText = '';

        // Zamenjave za ločila
        function applyPunctuation(text) {
            return text
                // Najprej zamenjaj besede za ločila (brez presledka pred ločilom)
                .replace(/\s*(pika)\s*/gi, '. ')
                .replace(/\s*(vejica)\s*/gi, ', ')
                .replace(/\s*(vprašaj)\s*/gi, '? ')
                .replace(/\s*(klicaj)\s*/gi, '! ')
                .replace(/\s*(nov odstavek|nova vrstica)\s*/gi, '\n')
                .replace(/\s*(dvopičje)\s*/gi, ': ')
                .replace(/\s*(pomišljaj)\s*/gi, ' - ')
                // Počisti dvojne presledke
                .replace(/ {2,}/g, ' ')
                // Po ločilu velika začetnica
                .replace(/([.?!]\s*)([a-zčšžćđ])/g, (m, p, c) => p + c.toUpperCase())
                .trim();
        }

        function capitalizeFirst(text) {
            if (!text) return text;
            return text.charAt(0).toUpperCase() + text.slice(1);
        }

        function toggleRecording() {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        }

        function startRecording() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) {
                alert("Tvoj brskalnik ne podpira govora. Prosim uporabi Chrome.");
                return;
            }

            // Shrani trenutno besedilo (kar je že v polju)
            savedText = document.getElementById('textOutput').value;

            recognition = new Speech();
            recognition.lang = 'sl-SI';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let interim = '';
                let finalSegment = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalSegment += event.results[i][0].transcript + ' ';
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }

                if (finalSegment) {
                    // Dodaj ločila in veliko začetnico
                    let processed = applyPunctuation(finalSegment.trim());
                    // Če je savedText prazen ali se konča s presledkom/ločilom, daj veliko začetnico
                    if (!savedText || savedText.trim() === '' || savedText.trim().endsWith('.') || savedText.trim().endsWith('?') || savedText.trim().endsWith('!') || savedText.trim().endsWith('\n')) {
                        processed = capitalizeFirst(processed);
                    }
                    savedText += (savedText && !savedText.endsWith('\n') ? ' ' : '') + processed;
                }

                // Prikaži: shranjeno + vmesno (interim)
                document.getElementById('textOutput').value = savedText + (interim ? interim : '');
            };

            recognition.onerror = (e) => {
                console.error(e.error);
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) recognition.start();
            };

            recognition.start();
            isRecording = true;
            document.getElementById('recordBtn').textContent = '⏹️ USTAVI';
            document.getElementById('recordBtn').classList.add('recording');
            document.getElementById('status').textContent = '👂 Poslušam te...';
        }

        function stopRecording() {
            if (recognition) recognition.stop();
            isRecording = false;

            // Zaključi besedilo
            let text = document.getElementById('textOutput').value.trim();
            if (text && !text.endsWith('.') && !text.endsWith('?') && !text.endsWith('!')) {
                text += '.';
            }
            document.getElementById('textOutput').value = text;
            savedText = text;

            document.getElementById('recordBtn').textContent = '🎤 ZAČNI PISANJE';
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('status').textContent = '✅ Končano.';
        }

        function speak() {
            const text = document.getElementById('textOutput').value;
            if (!text) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'sl-SI';
            const voices = window.speechSynthesis.getVoices();
            const sloVoice = voices.find(v => v.lang === 'sl-SI' || v.lang.startsWith('sl'));
            if (sloVoice) utter.voice = sloVoice;
            utter.rate = 0.95;
            window.speechSynthesis.speak(utter);
            document.getElementById('status').textContent = '🔊 Berem...';
            utter.onend = () => document.getElementById('status').textContent = '✅ Končano.';
        }

        function copyText() {
            const text = document.getElementById('textOutput').value;
            if (!text) return;
            navigator.clipboard.writeText(text);
            document.getElementById('status').textContent = '📋 Kopirano!';
            setTimeout(() => document.getElementById('status').textContent = '✅ Končano.', 2000);
        }

        function clearText() {
            if (confirm("Ali res želiš pobrisati vse?")) {
                document.getElementById('textOutput').value = '';
                savedText = '';
                document.getElementById('status').textContent = '🗑️ Pobrisano.';
            }
        }

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>
</html>
